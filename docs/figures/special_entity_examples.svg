<svg xmlns="http://www.w3.org/2000/svg" width="700" height="812" viewBox="0 0 700 812">
  <defs>
    <style>
      .panel-title { font: 700 17px 'DejaVu Sans', Arial, sans-serif; fill: #182026; }
      .body { font: 15px 'DejaVu Sans Mono', monospace; fill: #182026; }
      .label { font: 600 13px 'DejaVu Sans', Arial, sans-serif; fill: #182026; }
      .small { font: 12px 'DejaVu Sans', Arial, sans-serif; fill: #5b6770; }
      .panel { fill: #ffffff; stroke: #d8dee4; stroke-width: 1.5; rx: 16; ry: 16; }
      .disc-fill { fill: #fbd38d; opacity: 0.85; }
      .nest-outer { fill: #c6f6d5; opacity: 0.85; }
      .nest-inner { fill: #bee3f8; opacity: 0.95; }
      .overlap-a { fill: #f6d743; opacity: 0.82; }
      .overlap-b { fill: #f28b82; opacity: 0.78; }
      .overlap-shared { fill: #d97706; opacity: 0.38; }
      .line-disc { stroke: #b7791f; stroke-width: 3; fill: none; }
      .line-nest { stroke: #2f855a; stroke-width: 3; fill: none; }
      .line-overlap-a { stroke: #b7791f; stroke-width: 3; fill: none; }
      .line-overlap-b { stroke: #c53030; stroke-width: 3; fill: none; }
      .tag-disc { fill: #fff7e6; stroke: #b7791f; stroke-width: 1.5; rx: 8; ry: 8; }
      .tag-nest-outer { fill: #eefcf3; stroke: #2f855a; stroke-width: 1.5; rx: 8; ry: 8; }
      .tag-nest-inner { fill: #eff8ff; stroke: #2b6cb0; stroke-width: 1.5; rx: 8; ry: 8; }
      .tag-overlap-a { fill: #fffbea; stroke: #b7791f; stroke-width: 1.5; rx: 8; ry: 8; }
      .tag-overlap-b { fill: #fff5f5; stroke: #c53030; stroke-width: 1.5; rx: 8; ry: 8; }
      .connector { stroke: #6b7280; stroke-width: 1.6; fill: none; }
    </style>
  </defs>

  <rect x="0" y="0" width="700" height="812" fill="#f7fafc" />

  <g transform="translate(0,0)">
    <rect class="panel" x="24" y="14" width="632" height="182" />
    <text class="panel-title" x="40" y="42">Discontinuous Entity</text>
    <rect class="disc-fill" x="176" y="82" width="54" height="22" rx="4" ry="4" />
    <rect class="disc-fill" x="347" y="82" width="96" height="22" rx="4" ry="4" />
    <text class="body" y="100" xml:space="preserve">
      <tspan x="44">... displaying </tspan>
      <tspan x="176">verbal</tspan>
      <tspan x="228"> and physical </tspan>
      <tspan x="350">aggression</tspan>
      <tspan x="446"> towards staff ...</tspan>
    </text>
    <path class="line-disc" d="M178 108 L228 108" />
    <path class="line-disc" d="M349 108 L441 108" />
    <path class="connector" d="M203 111 C203 126, 251 126, 251 150" />
    <path class="connector" d="M392 111 C392 126, 332 126, 332 150" />
    <rect class="tag-disc" x="126" y="150" width="195" height="24" />
    <text class="label" x="136" y="167">Symptom: verbal aggression</text>
    <text class="small" x="44" y="184">One mention, two spans.</text>
  </g>

  <g transform="translate(0,218)">
    <rect class="panel" x="24" y="14" width="632" height="232" />
    <text class="panel-title" x="40" y="42">Nested Entity</text>
    <rect class="nest-outer" x="230" y="82" width="196" height="24" rx="4" ry="4" />
    <rect class="nest-inner" x="230" y="82" width="76" height="24" rx="4" ry="4" />
    <text class="body" y="100" xml:space="preserve">
      <tspan x="44">... there was marked </tspan>
      <tspan x="232">striatum</tspan>
      <tspan x="318"> involvement </tspan>
      <tspan x="430">in TRODAT SPECT ...</tspan>
    </text>
    <path class="line-nest" d="M232 111 L424 111" />
    <path class="line-nest" d="M232 118 L304 118" />
    <path class="connector" d="M319 113 C319 128, 319 128, 319 154" />
    <path class="connector" d="M268 120 C268 142, 160 142, 160 184" />
    <rect class="tag-nest-outer" x="206" y="154" width="278" height="24" />
    <text class="label" x="216" y="171">Imaging_finding: striatum involvement</text>
    <rect class="tag-nest-inner" x="70" y="184" width="200" height="24" />
    <text class="label" x="80" y="201">Anatomic_location: striatum</text>
    <text class="small" x="44" y="238">One span fully contains another.</text>
  </g>

  <g transform="translate(0,486)">
    <rect class="panel" x="24" y="14" width="652" height="242" />
    <text class="panel-title" x="40" y="42">Overlapping Entities</text>
    <rect class="overlap-a" x="81" y="82" width="282" height="22" rx="4" ry="4" />
    <rect class="overlap-b" x="249" y="82" width="366" height="22" rx="4" ry="4" />
    <rect class="overlap-shared" x="249" y="82" width="114" height="22" rx="4" ry="4" />
    <text class="body" y="100" xml:space="preserve">
      <tspan x="44">... </tspan>
      <tspan x="81">after a successful </tspan>
      <tspan x="249">tympanoplasty</tspan>
      <tspan x="365"> with homograft pericardium </tspan>
      <tspan x="620">...</tspan>
    </text>
    <path class="line-overlap-a" d="M83 109 L361 109" />
    <path class="line-overlap-b" d="M251 116 L612 116" />
    <path class="connector" d="M158 112 C158 130, 158 130, 158 153" />
    <path class="connector" d="M424 119 C424 145, 424 145, 424 187" />
    <rect class="tag-overlap-a" x="54" y="153" width="308" height="24" />
    <text class="label" x="64" y="170">Time_point: after a successful tympanoplasty</text>
    <rect class="tag-overlap-b" x="232" y="187" width="348" height="24" />
    <text class="label" x="242" y="204">Treatment: tympanoplasty with homograft pericardium</text>
    <text class="small" x="44" y="236">Shared text, no full containment.</text>
  </g>
</svg>
